<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>Nonogram 測試工具</title>

<style>
  body {
    font-family: sans-serif;
    padding: 20px;
  }

  textarea {
    width: 200px;
    height: 150px;
  }

  .container {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
  }

  button {
    padding: 10px 20px;
    font-size: 16px;
  }

  table {
    border-collapse: collapse;
  }

  td {
    width: 25px;
    height: 25px;
    border: 1px solid #aaa;
    text-align: center;
    vertical-align: middle;
    cursor: pointer;
    user-select: none;
  }

  /* ✅ 每5格粗線 */
  td.thick-right {
    border-right: 3px solid black !important;
  }

  td.thick-bottom {
    border-bottom: 3px solid black !important;
  }

  td.filled {
    background: black;
  }

  td.cross::after {
    content: "✕";
    font-size: 16px;
  }

  .hint {
    font-size: 12px;
    background: #f5f5f5;
  }
</style>

</head>
<body>

<h2>Nonogram 測試工具（支援右鍵X + 每5格粗線）</h2>

<div class="container">
  <div>
    <h3>列提示 (Rows)</h3>
    <textarea id="rowsInput">3
1 1
5
1
2</textarea>
  </div>

  <div>
    <h3>欄提示 (Cols)</h3>
    <textarea id="colsInput">1
3
1 1
3
1</textarea>
  </div>
</div>

<button onclick="generate()">生成盤面</button>

<div id="board"></div>

<script>
function parseInput(text) {
  return text
    .trim()
    .split("\n")
    .map(line => line.trim().split(/\s+/).map(Number));
}

function generate() {
  const rows = parseInput(document.getElementById("rowsInput").value);
  const cols = parseInput(document.getElementById("colsInput").value);

  const height = rows.length;
  const width = cols.length;

  const table = document.createElement("table");

  const maxColHints = Math.max(...cols.map(c => c.length));
  const maxRowHints = Math.max(...rows.map(r => r.length));

  // ✅ 欄提示
  for (let i = 0; i < maxColHints; i++) {
    const tr = document.createElement("tr");

    for (let j = 0; j < maxRowHints; j++) {
      tr.appendChild(document.createElement("td"));
    }

    for (let c = 0; c < width; c++) {
      const td = document.createElement("td");
      td.className = "hint";

      const index = cols[c].length - maxColHints + i;
      if (index >= 0) td.textContent = cols[c][index];

      // 粗線
      if ((c + 1) % 5 === 0) td.classList.add("thick-right");

      tr.appendChild(td);
    }

    table.appendChild(tr);
  }

  // ✅ 主體 + 列提示
  for (let r = 0; r < height; r++) {
    const tr = document.createElement("tr");

    // 列提示
    for (let i = 0; i < maxRowHints; i++) {
      const td = document.createElement("td");
      td.className = "hint";

      const index = rows[r].length - maxRowHints + i;
      if (index >= 0) td.textContent = rows[r][index];

      if ((r + 1) % 5 === 0) td.classList.add("thick-bottom");

      tr.appendChild(td);
    }

    // 格子
    for (let c = 0; c < width; c++) {
      const td = document.createElement("td");
      td.state = 0;

      // 左鍵
      td.onclick = () => {
        td.state = (td.state + 1) % 3;

        td.classList.remove("filled", "cross");

        if (td.state === 1) td.classList.add("filled");
        if (td.state === 2) td.classList.add("cross");
      };

      // ✅ 右鍵
      td.oncontextmenu = (e) => {
        e.preventDefault();

        if (td.state === 2) {
          td.state = 0;
          td.classList.remove("cross");
        } else {
          td.state = 2;
          td.classList.remove("filled");
          td.classList.add("cross");
        }
      };

      // ✅ 粗線判定
      if ((c + 1) % 5 === 0) td.classList.add("thick-right");
      if ((r + 1) % 5 === 0) td.classList.add("thick-bottom");

      tr.appendChild(td);
    }

    table.appendChild(tr);
  }

  const board = document.getElementById("board");
  board.innerHTML = "";
  board.appendChild(table);
}
</script>

</body>
</html>
