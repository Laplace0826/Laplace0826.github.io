<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的網站</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-align: center;
        }

        .container {
            padding: 80px 20px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .btn {
            margin-top: 20px;
            padding: 12px 25px;
            background: white;
            color: #333;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
        }

        .btn:hover {
            background: #ddd;
        }

        footer {
            margin-top: 60px;
            font-size: 14px;
            opacity: 0.7;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>👋 你好，我是你的名字</h1>
        <p>這是我的 GitHub 網站</p>

        <a class="btn" href="https://github.com/你的帳號" target="_blank">
            查看我的 GitHub
        </a>

        <footer>
            © 2026 我的網站
        </footer>
    </div>
</body>
</html>
